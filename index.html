let currentFilter = 'all';
let activeId = null;
let projection = null;

function getColor(scope) {
  return scope === 'whole' ? '#EF9F27' : '#185FA5';
}

function showTooltip(event, p) {
  const tt = document.getElementById('tooltip');
  const container = document.getElementById('map-container');
  const cRect = container.getBoundingClientRect();
  const eRect = event.target.getBoundingClientRect();
  let tx = eRect.left - cRect.left + 12;
  let ty = eRect.top - cRect.top - 10;
  if (tx + 250 > cRect.width) tx = eRect.left - cRect.left - 255;
  if (ty < 0) ty = eRect.top - cRect.top + 20;
  tt.style.left = tx + 'px';
  tt.style.top = ty + 'px';
  tt.innerHTML = `<div class="t-name">#${p.id} ${p.en}</div><div class="t-zh">${p.zh}</div><div class="t-meta"><span class="t-badge ${p.scope==='whole'?'b-whole':'b-zone'}">${p.scope==='whole'?'整体':'园中园'}</span>${p.period}</div>`;
  tt.style.opacity = '1';
}

function hideTooltip() {
  document.getElementById('tooltip').style.opacity = '0';
}

function selectPark(id) {
  activeId = activeId === id ? null : id;
  renderDots();
  renderList();
  if (activeId) {
    const card = document.querySelector('.pc[data-id="'+activeId+'"]');
    if (card) card.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function renderDots() {
  const g = document.getElementById('g-dots');
  g.innerHTML = '';
  if (!projection) return;
  const filtered = parks.filter(p => currentFilter === 'all' || p.scope === currentFilter);
  document.getElementById('cnt').textContent = filtered.length + ' parks';
  filtered.forEach(p => {
    const [px, py] = projection(p.ll);
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', px);
    circle.setAttribute('cy', py);
    circle.setAttribute('r', activeId === p.id ? 8 : 5);
    circle.setAttribute('fill', getColor(p.scope));
    circle.setAttribute('stroke', '#fff');
    circle.setAttribute('stroke-width', '1.5');
    circle.setAttribute('class', 'dot');
    circle.addEventListener('mouseenter', e => showTooltip(e, p));
    circle.addEventListener('mouseleave', hideTooltip);
    circle.addEventListener('click', () => selectPark(p.id));
    g.appendChild(circle);
  });
}

function renderList() {
  const list = document.getElementById('park-list');
  list.innerHTML = '';
  const filtered = parks.filter(p => currentFilter === 'all' || p.scope === currentFilter);
  filtered.forEach(p => {
    const d = document.createElement('div');
    d.className = 'pc';
    d.setAttribute('data-id', p.id);
    if (activeId === p.id) d.style.borderColor = 'var(--color-border-info)';
    d.innerHTML = `<div class="pc-num">#${p.id}</div><div class="pc-en">${p.en}</div><div class="pc-zh">${p.zh}</div><div class="pc-mt">${p.scope==='whole'?'整体':'园中园'} · ${p.period}</div>`;
    d.addEventListener('click', () => selectPark(p.id));
    list.appendChild(d);
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  activeId = null;
  document.querySelectorAll('#filter-bar button').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderDots();
  renderList();
}

async function initMap() {
  try {
    const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const chinaAndNeighbours = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');

    const svg = d3.select('#china-svg');
    const width = 960, height = 720;

    projection = d3.geoMercator()
      .center([105, 35])
      .scale(720)
      .translate([width / 2, height / 2]);

    const path = d3.geoPath().projection(projection);
    const countries = topojson.feature(chinaAndNeighbours, chinaAndNeighbours.objects.countries);

    const chinaId = '156';
    const twId = '158';
    const hkId = '344';
    const moId = '446';
    const chinaGroup = [chinaId, twId, hkId, moId];
    const neighbourIds = ['496','643','398','762','860','004','586','356','064','524','104','418','116','704','408','410'];

    const gLand = d3.select('#g-land');

    gLand.selectAll('.neighbour')
      .data(countries.features.filter(f => neighbourIds.includes(f.id)))
      .join('path')
      .attr('class', 'neighbour')
      .attr('d', path)
      .attr('fill', '#D3D1C7')
      .attr('stroke', '#fff')
      .attr('stroke-width', 0.4);

    gLand.selectAll('.china')
      .data(countries.features.filter(f => chinaGroup.includes(f.id)))
      .join('path')
      .attr('class', 'china')
      .attr('d', path)
      .attr('fill', d => {
        if (d.id === twId) return '#9FE1CB';
        if (d.id === hkId) return '#5DCAA5';
        if (d.id === moId) return '#5DCAA5';
        return '#85B7EB';
      })
      .attr('stroke', '#fff')
      .attr('stroke-width', 0.8);

    document.getElementById('loading').style.display = 'none';
    renderDots();
    renderList();

  } catch(e) {
    document.getElementById('loading').textContent = 'Map load failed — try refreshing.';
    console.error(e);
  }
}

initMap();
</script>
